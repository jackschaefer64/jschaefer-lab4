<!DOCTYPE html>
    <html>
        <head>
        <title>page1</title>
        <style>
    .image-container {
        /* Set the desired background color */
        background-color: #f0f0f0; /* Light gray background, for example */
    
        /* Apply a border to the container */
        border: 5px solid #333; /* Dark gray 5px border */
    
        /* Define dimensions and padding (optional, adjust as needed) */
        width: 300px;
        height: 400px;
        padding: 10px; /* Space between the image and the border */
    }

    .image-container img {
        /* Ensure the image fits within the container's content and padding area */
        width: 100%;
        height: 100%;
        /* Use object-fit if you want the image to cover the space without distortion */
        object-fit: cover;
    }
        
</style>
    </head>
    <body style = "background-color: rgb(56, 15, 51);">
        <h1 style = "text-align: center;">HUZZAH</h1>
        <div class = "image-container">
            <img src = "/img/wizard.png", width = "300", height = "400">
        </div>
        <p style = "text-align: center;"; >FIREBALL</p>
    </body>
</html>
